<!--
  Campus Party Activity template
  For campus party/government activity reports, flag-raising ceremonies,
  ideological education, Young Pioneers activities, and civic education.
-->

<section style="max-width: 100%; margin: 0 auto; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; background: #ffd897;">

<section style="background: linear-gradient(180deg, #e60012 0%, #c70000 62%, #ffd897 100%); padding: 26px 18px 32px; text-align: center;">
<section style="width: 64px; height: 4px; background: #ffc000; margin: 0 auto 18px; border-radius: 999px;"></section>
<p style="font-size: 13px; color: #fff5d6; letter-spacing: 4px; margin: 0 0 10px; font-weight: 700;">CAMPUS ACTIVITY</p>
<p style="font-size: 31px; font-weight: 900; color: #ffffff; line-height: 1.28; letter-spacing: 1px; margin: 0;">{{HEADLINE_TITLE}}</p>
<section style="display: inline-block; margin: 18px auto 0; background: #ffffff; border-radius: 20px; padding: 5px 13px;">
<p style="font-size: 14px; color: #e60012; line-height: 1.6; letter-spacing: 1px; margin: 0; font-weight: 700;">{{DIGEST}}</p>
</section>
<p style="font-size: 12px; color: rgba(255,255,255,0.82); line-height: 1.7; letter-spacing: 1px; margin: 12px 0 0;">{{AUTHOR}} · {{DATE_SHORT}}</p>
</section>

<section style="background: #ffd897; padding: 0 16px 16px;">
<section style="background: #ffffff; border-radius: 12px; padding: 16px 16px 14px; border: 1px solid #f0c35c;">
{{HEADLINE_BODY}}
</section>
</section>

{{HEADLINE_IMAGE}}
{{BODY_SECTIONS}}

<section style="background: #ffd897; padding: 8px 16px 16px;">
<section style="background: #fffbea; border-radius: 10px; padding: 15px 16px; border: 1px solid #f0c35c;">
<p style="font-size: 15px; color: #6f351d; line-height: 1.9; margin: 0; text-align: center;">{{CONCLUSION}}</p>
</section>
</section>

<section style="background: #ffd897; padding: 0 16px 24px;">
<section style="background: #ffffff; border-radius: 10px; padding: 16px 16px; border: 1px solid #cd5029;">
<p style="font-size: 15px; color: #333333; line-height: 1.9; margin: 0; text-align: center;">{{CTA}}</p>
</section>
</section>

<section style="background: #ffd897; padding: 0 16px 34px; text-align: center;">
<p style="font-size: 12px; color: #e60012; letter-spacing: 1px; margin: 0 0 12px;">- END -</p>
<section style="width: 42px; height: 3px; background: #e60012; margin: 0 auto 14px; border-radius: 999px;"></section>
<p style="font-size: 13px; color: #c50000; line-height: 2.1; letter-spacing: 1px; margin: 0;">排版 | 沐梦杰<br/>初审 | 吴晓伟<br/>复审 | 段国瑞<br/>终审 | 卢金辉</p>
</section>

</section>
