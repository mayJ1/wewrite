  Studio Brief 微信公众号模板
  极简、编辑风 — 无品牌标签纯净版
-->

<section style="max-width: 100%; margin: 0 auto; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif; background: #ffffff;">

<section style="background: #ffffff; padding: 28px 22px 24px; border-bottom: 1px solid #e7e0d5;">
<p style="font-size: 14px; color: #4f4a43; line-height: 1.8; margin: 0; max-width: 28em;">{{DIGEST}}</p>
</section>

<section style="background: #ffffff; padding: 30px 22px 24px; border-bottom: 1px solid rgba(23,22,20,0.08);">
<p style="font-size: 27px; font-weight: 700; color: #161513; line-height: 1.3; letter-spacing: 0.2px; margin: 0 0 14px;">{{HEADLINE_TITLE}}</p>
<section style="width: 52px; height: 2px; background: #c96d44; margin: 0 0 16px;"></section>
{{HEADLINE_BODY}}
<p style="font-size: 11px; color: #8f867a; margin: 12px 0 0; letter-spacing: 0.4px;">{{HEADLINE_SOURCE}}</p>
</section>

{{HEADLINE_IMAGE}}
{{BODY_SECTIONS}}

<section style="background: #ffffff; padding: 8px 22px 24px;">
<section style="background: #f6f2ea; border-radius: 14px; padding: 18px 18px 16px; border: 1px solid rgba(23,22,20,0.08);">
<p style="font-size: 15px; color: #2f2b27; line-height: 1.9; margin: 0;">{{CONCLUSION}}</p>
</section>
</section>

<section style="background: #ffffff; padding: 0 22px 34px;">
<p style="font-size: 15px; color: #2f2b27; line-height: 1.9; margin: 0;">{{CTA}}</p>
</section>

</section>
